<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="referrer" content="no-referrer">
<title>Peptides Shop</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #ffffff;
    --snow: #f4f7fb;
    --ice: #e8eef6;
    --silver: #c5cfde;
    --steel: #8a95a8;
    --slate: #5a6577;
    --navy: #1a2a44;
    --deep: #0f1b2d;

    --blue-50: #eef4ff;
    --blue-100: #d9e6ff;
    --blue-200: #b3ccff;
    --blue-400: #4d8bff;
    --blue-500: #2563eb;
    --blue-600: #1d4ed8;
    --blue-700: #1e40af;
    --blue-glow: rgba(37, 99, 235, 0.15);
    --blue-glow2: rgba(37, 99, 235, 0.08);

    --mint: #10b981;
    --coral: #ef4444;
    --amber: #f59e0b;

    --radius: 10px;
    --radius-sm: 10px;
    --radius-xs: 8px;
    --shadow-sm: 0 1px 3px rgba(15,27,45,0.04), 0 1px 2px rgba(15,27,45,0.06);
    --shadow-md: 0 4px 16px rgba(15,27,45,0.06), 0 2px 6px rgba(15,27,45,0.04);
    --shadow-lg: 0 12px 40px rgba(15,27,45,0.1), 0 4px 12px rgba(15,27,45,0.05);
    --shadow-blue: 0 4px 20px rgba(37,99,235,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--snow);
    color: var(--navy);
    min-height: 100vh;
    padding-bottom: 90px;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== DNA HELIX BACKGROUND ===== */
  .dna-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
    opacity: 0.14;
  }

  .dna-bg .dna-strand {
    position: absolute;
    height: 200%;
  }

  .dna-bg .dna-strand:nth-child(1) {
    left: -5%; width: 45%;
    animation: dnaScroll 35s linear infinite;
  }

  .dna-bg .dna-strand:nth-child(2) {
    left: 35%; width: 45%;
    animation: dnaScroll 42s linear infinite reverse;
    opacity: 0.7;
  }

  .dna-bg .dna-strand:nth-child(3) {
    left: 65%; width: 45%;
    animation: dnaScroll 38s linear infinite;
    opacity: 0.5;
  }

  @keyframes dnaScroll {
    0% { transform: translateY(0); }
    100% { transform: translateY(-50%); }
  }

  /* ===== HEADER ===== */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--ice);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
  }

  .header-logo {
    height: 42px;
    width: auto;
    object-fit: contain;
  }

  .cart-btn {
    position: relative;
    width: 44px;
    height: 44px;
    border: none;
    background: var(--white);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--ice);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .cart-btn:active { transform: scale(0.9); box-shadow: var(--shadow-md); }
  .cart-btn svg { width: 20px; height: 20px; fill: var(--slate); }

  .cart-badge {
    position: absolute;
    top: -5px;
    right: -5px;
    min-width: 20px;
    height: 20px;
    background: var(--blue-500);
    color: #fff;
    font-size: 11px;
    font-weight: 800;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 5px;
    transform: scale(0);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 2px 8px rgba(37,99,235,0.3);
    border: 2px solid var(--white);
  }

  .cart-badge.show { transform: scale(1); }

  /* ===== SEARCH ===== */
  .search-wrap { padding: 4px 16px 12px; }

  .search-box {
    display: flex;
    align-items: center;
    background: var(--white);
    border-radius: 12px;
    padding: 0 14px;
    gap: 10px;
    border: 1.5px solid var(--ice);
    box-shadow: var(--shadow-sm);
    transition: border-color 0.25s, box-shadow 0.25s;
  }

  .search-box:focus-within {
    border-color: var(--blue-400);
    box-shadow: 0 0 0 3px var(--blue-glow);
  }

  .search-box svg { width: 18px; height: 18px; fill: var(--silver); flex-shrink: 0; }

  .search-box input {
    flex: 1;
    border: none;
    background: transparent;
    padding: 12px 0;
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    color: var(--navy);
    outline: none;
  }

  .search-box input::placeholder { color: var(--silver); }

  /* ===== CATEGORIES ===== */
  .categories {
    display: flex;
    gap: 6px;
    padding: 0 16px 12px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .categories::-webkit-scrollbar { display: none; }

  .cat-chip {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--ice);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    background: var(--white);
    color: var(--slate);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    white-space: nowrap;
  }

  .cat-chip.active {
    background: var(--blue-500);
    color: #fff;
    border-color: var(--blue-500);
    box-shadow: var(--shadow-blue);
    transform: translateY(-1px);
  }

  .cat-chip:active { transform: scale(0.95); }

  /* ===== PRODUCTS ===== */
  .products-section {
    position: relative;
    z-index: 1;
  }

  .products {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    padding: 0 10px 20px;
  }

  .product-card {
    background: rgba(255,255,255,0.9);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--ice);
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    opacity: 0;
    transform: translateY(24px);
    animation: cardReveal 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    transition: transform 0.25s, box-shadow 0.25s;
    position: relative;
  }

  .product-card:active {
    transform: scale(0.97);
    box-shadow: var(--shadow-md);
  }

  @keyframes cardReveal {
    to { opacity: 1; transform: translateY(0); }
  }

  .product-img-wrap {
    width: 100%;
    aspect-ratio: 0.8;
    overflow: hidden;
    background: linear-gradient(145deg, var(--blue-50), var(--ice));
    position: relative;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 0;
  }

  .img-placeholder svg { width: 22px; height: 22px; fill: var(--blue-200); opacity: 0.6; }

  

  .product-info { padding: 6px 7px 8px; }

  .product-cat {
    font-size: 8px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--blue-500);
    margin-bottom: 3px;
    opacity: 0.8;
  }

  .product-name {
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 5px;
    color: var(--navy);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .product-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .product-price {
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 800;
    color: var(--navy);
  }

  .product-price .cur {
    font-size: 9px;
    font-weight: 600;
    color: var(--steel);
  }

  .add-btn {
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 7px;
    background: var(--blue-500);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
    box-shadow: var(--shadow-blue);
  }

  .add-btn:active { transform: scale(0.85); }

  .qty-control {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .qty-btn {
    width: 24px;
    height: 24px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .qty-btn:active { transform: scale(0.85); }
  .qty-btn.plus { background: var(--blue-500); color: #fff; }
  .qty-btn.minus { background: var(--ice); color: var(--slate); }
  .qty-num { font-size: 12px; font-weight: 800; min-width: 14px; text-align: center; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    grid-column: 1 / -1;
  }
  .empty-state svg { width: 56px; height: 56px; fill: var(--silver); margin-bottom: 16px; }
  .empty-state .title { font-family: 'Outfit'; font-size: 16px; font-weight: 700; color: var(--slate); }
  .empty-state .sub { font-size: 14px; color: var(--steel); margin-top: 4px; }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,27,45,0.3);
    backdrop-filter: blur(4px);
    z-index: 300;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s;
  }
  .modal-overlay.open { opacity: 1; visibility: visible; }

  .modal {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-height: 92vh;
    background: var(--white);
    border-radius: 24px 24px 0 0;
    z-index: 301;
    transform: translateY(100%);
    transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 -8px 40px rgba(15,27,45,0.12);
  }
  .modal.open { transform: translateY(0); }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--silver);
    border-radius: 2px;
    margin: 10px auto 0;
    flex-shrink: 0;
    opacity: 0.5;
  }

  .modal-scroll {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
  }

  .modal-img {
    width: 100%;
    aspect-ratio: 1;
    display: block;
    background: linear-gradient(145deg, var(--blue-50), var(--ice));
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    position: relative;
  }

  .modal-body { padding: 20px; }

  .modal-cat {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--blue-600);
    background: var(--blue-50);
    padding: 4px 10px;
    border-radius: 6px;
    margin-bottom: 10px;
  }

  .modal-name {
    font-family: 'Outfit', sans-serif;
    font-size: 22px;
    font-weight: 800;
    line-height: 1.2;
    color: var(--navy);
    margin-bottom: 6px;
  }

  .modal-price {
    font-family: 'Outfit', sans-serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--blue-600);
    margin-bottom: 20px;
  }

  .modal-price .cur { font-size: 16px; color: var(--steel); font-weight: 600; }

  .modal-section { margin-bottom: 16px; }

  .modal-section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--steel);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .modal-section-title svg { width: 14px; height: 14px; fill: var(--blue-400); }

  .modal-section-text {
    font-size: 14px;
    line-height: 1.65;
    color: var(--slate);
    white-space: pre-line;
    background: var(--snow);
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid var(--ice);
  }

  .modal-footer {
    padding: 14px 20px;
    padding-bottom: max(14px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--ice);
    display: flex;
    gap: 12px;
    align-items: center;
    flex-shrink: 0;
    background: var(--white);
  }

  .modal-add-btn {
    flex: 1;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--blue-500), var(--blue-700));
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s;
    box-shadow: var(--shadow-blue);
  }
  .modal-add-btn:active { transform: scale(0.97); }

  .modal-qty { display: flex; align-items: center; gap: 10px; }
  .modal-qty-btn {
    width: 44px; height: 44px;
    border: none; border-radius: 12px;
    font-size: 20px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: transform 0.15s;
  }
  .modal-qty-btn:active { transform: scale(0.9); }
  .modal-qty-btn.plus { background: var(--blue-500); color: #fff; box-shadow: var(--shadow-blue); }
  .modal-qty-btn.minus { background: var(--ice); color: var(--slate); }
  .modal-qty-num { font-family: 'Outfit'; font-size: 18px; font-weight: 800; min-width: 24px; text-align: center; }

  /* ===== CART PANEL ===== */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(15,27,45,0.3);
    backdrop-filter: blur(4px);
    z-index: 200;
    opacity: 0; visibility: hidden;
    transition: all 0.3s;
  }
  .overlay.open { opacity: 1; visibility: visible; }

  .cart-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    max-height: 85vh;
    background: var(--white);
    border-radius: 24px 24px 0 0;
    z-index: 201;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    display: flex; flex-direction: column;
    box-shadow: 0 -8px 40px rgba(15,27,45,0.12);
  }
  .cart-panel.open { transform: translateY(0); }

  .cart-handle { width: 36px; height: 4px; background: var(--silver); opacity: 0.4; border-radius: 2px; margin: 10px auto 0; }

  .cart-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 10px;
  }
  .cart-title { font-family: 'Outfit'; font-size: 20px; font-weight: 800; }
  .cart-clear { border: none; background: none; color: var(--coral); font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; }

  .cart-items { flex: 1; overflow-y: auto; padding: 0 20px; }

  .cart-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--ice);
    animation: slideIn 0.3s ease both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .cart-item-img {
    width: 50px; height: 50px;
    border-radius: var(--radius-sm);
    background: var(--blue-50);
    background-size: cover; background-position: center;
    flex-shrink: 0;
    border: 1px solid var(--ice);
  }

  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cart-item-price { font-size: 12px; color: var(--steel); font-weight: 600; margin-top: 2px; }

  .cart-footer {
    padding: 14px 20px;
    padding-bottom: max(14px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--ice);
  }

  .cart-total { display: flex; justify-content: space-between; margin-bottom: 12px; }
  .cart-total-label { font-size: 15px; font-weight: 600; color: var(--steel); }
  .cart-total-price { font-family: 'Outfit'; font-size: 22px; font-weight: 900; color: var(--blue-600); }

  .checkout-btn {
    width: 100%; padding: 15px;
    border: none; border-radius: 12px;
    background: linear-gradient(135deg, var(--blue-500), var(--blue-700));
    color: #fff;
    font-family: 'Outfit'; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: transform 0.2s;
    box-shadow: var(--shadow-blue);
  }
  .checkout-btn:active { transform: scale(0.97); }

  .cart-empty { text-align: center; padding: 50px 20px; }
  .cart-empty svg { width: 48px; height: 48px; fill: var(--silver); margin-bottom: 12px; }
  .cart-empty .text { font-size: 15px; color: var(--steel); font-weight: 600; }

  /* ===== CHECKOUT ===== */
  .checkout-view { padding: 0 16px; display: none; position: relative; z-index: 1; }
  .checkout-view.active { display: block; animation: fadeSlide 0.35s ease; }
  .catalog-view.hidden { display: none; }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .checkout-back {
    display: inline-flex; align-items: center; gap: 6px;
    border: none; background: var(--white);
    font-family: inherit; font-size: 14px; font-weight: 700;
    color: var(--blue-500); cursor: pointer; padding: 10px 14px;
    border-radius: var(--radius-xs);
    box-shadow: var(--shadow-sm); border: 1px solid var(--ice);
    margin: 12px 0 16px;
    transition: transform 0.2s;
  }
  .checkout-back:active { transform: scale(0.96); }

  .checkout-section { margin-bottom: 20px; }
  .checkout-section-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--steel); margin-bottom: 10px;
  }

  .form-input {
    width: 100%; padding: 13px 16px;
    border: 1.5px solid var(--ice); border-radius: 12px;
    font-family: inherit; font-size: 14px; font-weight: 500;
    color: var(--navy); background: var(--white);
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    margin-bottom: 8px;
  }
  .form-input:focus { border-color: var(--blue-400); box-shadow: 0 0 0 3px var(--blue-glow); }
  .form-input::placeholder { color: var(--silver); }

  .order-item {
    display: flex; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid var(--ice); font-size: 14px;
  }
  .order-item .name { font-weight: 600; color: var(--navy); }
  .order-item .qp { color: var(--steel); font-weight: 600; }

  .order-total {
    display: flex; justify-content: space-between;
    padding: 14px 0; font-weight: 800;
  }
  .order-total .label { font-size: 16px; color: var(--slate); }
  .order-total .price { font-family: 'Outfit'; font-size: 20px; color: var(--blue-600); }

  .submit-btn {
    width: 100%; padding: 16px;
    border: none; border-radius: 14px;
    background: linear-gradient(135deg, var(--blue-500), var(--blue-700));
    color: #fff; font-family: 'Outfit'; font-size: 16px; font-weight: 700;
    cursor: pointer; margin-bottom: 24px;
    box-shadow: var(--shadow-blue);
    transition: transform 0.2s;
    position: relative; overflow: hidden;
  }
  .submit-btn:active { transform: scale(0.97); }
  .submit-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* ===== SUCCESS ===== */
  .success-overlay {
    position: fixed; inset: 0;
    background: var(--white); z-index: 400;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 40px;
  }
  .success-overlay.show { display: flex; }

  .success-check {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blue-500), var(--blue-700));
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
    box-shadow: var(--shadow-blue);
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .success-check svg { width: 36px; height: 36px; fill: white; }

  @keyframes popIn {
    0% { transform: scale(0); }
    100% { transform: scale(1); }
  }

  .success-title {
    font-family: 'Outfit'; font-size: 24px; font-weight: 800;
    color: var(--navy); margin-bottom: 8px;
    animation: fadeSlide 0.5s 0.2s ease both;
  }
  .success-text {
    font-size: 15px; color: var(--steel); font-weight: 500; line-height: 1.5;
    animation: fadeSlide 0.5s 0.3s ease both;
  }
  .success-done {
    margin-top: 30px; padding: 14px 40px;
    border: none; border-radius: 12px;
    background: var(--blue-500); color: #fff;
    font-family: 'Outfit'; font-size: 15px; font-weight: 700;
    cursor: pointer; box-shadow: var(--shadow-blue);
    animation: fadeSlide 0.5s 0.4s ease both;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--navy); color: #fff;
    padding: 10px 20px; border-radius: 12px;
    font-size: 13px; font-weight: 600;
    white-space: nowrap; opacity: 0;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 500; pointer-events: none;
    box-shadow: var(--shadow-lg);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

    photo:'https://raw.githubusercontent.com/ralfloren066-tech/product-images/7ba635d0bca946d0338c35c7c34a0e9ddb31741d/images/Semaglutide-50mg.jpg' },
  { id:11, name:'ZPHC Mega Mass Mix', category:'Набор веса', price:15900,
    description:'Анаболический пептидный микс (комбинация IGF, GHRP, GHRH и т.п.).\nЦель: набор мышечной массы.',
    recommendation:'Для начинающих:\n100 мкг смеси (по 50 каждого) 2–3 раза в день.\n\nСтандартная схема:\n100–200 мкг каждого пептида, 3 раза в день:\n— утром натощак\n— днём за час до еды или 2 часа после\n— перед сном',
    photo:'https://raw.githubusercontent.com/ralfloren066-tech/product-images/7ba635d0bca946d0338c35c7c34a0e9ddb31741d/images/Mega-mass-mix.jpg' },
  { id:12, name:'ZPHC GHK-Cu', category:'Омоложение', price:2860,
    description:'Медный пептид GHK-Cu.\nЦель: регенерация кожи, стимуляция коллагена, заживление, косметология.',
    recommendation:'Для кожи и волос: 1–2,5 мг раз в день.\nДля связок и суставов: 2,5–5 мг через день.\nОбщее омоложение: 1–2 мг ежедневно или 5 мг 2–3 раза в неделю.',
    photo:'https://raw.githubusercontent.com/ralfloren066-tech/product-images/7ba635d0bca946d0338c35c7c34a0e9ddb31741d/images/GHK-Cu.jpg' }
];

const CATEGORIES = ['Все', ...new Set(PRODUCTS.map(p => p.category))];
let cart = {}, activeCat = 'Все', searchQ = '';

function init() {
  if (window.Telegram?.WebApp) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); }
  renderCategories();
  renderProducts();
}

function renderCategories() {
  document.getElementById('categories').innerHTML = CATEGORIES.map(c =>
    `<button class="cat-chip ${c===activeCat?'active':''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}

function setCat(c) { activeCat=c; renderCategories(); renderProducts(); }

function filtered() {
  return PRODUCTS.filter(p => {
    const mc = activeCat==='Все' || p.category===activeCat;
    const ms = !searchQ || p.name.toLowerCase().includes(searchQ.toLowerCase());
    return mc && ms;
  });
}

function renderProducts() {
  const grid = document.getElementById('productsGrid');
  const list = filtered();
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <div class="title">Ничего не найдено</div>
      <div class="sub">Попробуйте другой запрос</div></div>`;
    return;
  }
  grid.innerHTML = list.map((p,i) => {
    const qty = cart[p.id]||0;
    
    return `
      <div class="product-card" style="animation-delay:${i*0.06}s" onclick="openModal(${p.id})">
        <div class="product-img-wrap" style="background-image:url('${p.photo}')">
          <div class="img-placeholder"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6z"/></svg></div>
                  </div>
        <div class="product-info">
          <div class="product-cat">${p.category}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-bottom">
            <div class="product-price">${fmt(p.price)} <span class="cur">₽</span></div>
            ${qty>0
              ? `<div class="qty-control">
                  <button class="qty-btn minus" onclick="event.stopPropagation();chg(${p.id},-1)">−</button>
                  <span class="qty-num">${qty}</span>
                  <button class="qty-btn plus" onclick="event.stopPropagation();chg(${p.id},1)">+</button>
                </div>`
              : `<button class="add-btn" onclick="event.stopPropagation();add(${p.id})">+</button>`}
          </div>
        </div>
      </div>`;
  }).join('');
}

function onSearch(v) { searchQ=v; renderProducts(); }

// ===== MODAL =====
let currentModal = null;

function openModal(id) {
  const p = PRODUCTS.find(x=>x.id===id);
  if(!p) return;
  currentModal = id;
  document.getElementById('modalScroll').innerHTML = `
    <div class="modal-img" style="background-image:url('${p.photo}')"></div>
    <div class="modal-body">
      <div class="modal-cat">${p.category}</div>
      <div class="modal-name">${p.name}</div>
      <div class="modal-price">${fmt(p.price)} <span class="cur">₽</span></div>
      ${p.description ? `<div class="modal-section">
        <div class="modal-section-title">
          <svg viewBox="0 0 24 24"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
          Описание
        </div>
        <div class="modal-section-text">${esc(p.description)}</div>
      </div>` : ''}
      ${p.recommendation ? `<div class="modal-section">
        <div class="modal-section-title">
          <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-1.99.9-1.99 2L3 19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 11h-4v4h-4v-4H6v-4h4V6h4v4h4v4z"/></svg>
          Рекомендации по применению
        </div>
        <div class="modal-section-text">${esc(p.recommendation)}</div>
      </div>` : ''}
    </div>`;
  renderModalFooter(id, cart[id]||0);
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderModalFooter(id, qty) {
  const p = PRODUCTS.find(x=>x.id===id);
  const subtotal = p ? fmt(qty * p.price) : 0;
  document.getElementById('modalFooter').innerHTML = qty>0
    ? `<div class="modal-qty">
        <button class="modal-qty-btn minus" onclick="chgModal(${id},-1)">−</button>
        <span class="modal-qty-num">${qty}</span>
        <button class="modal-qty-btn plus" onclick="chgModal(${id},1)">+</button>
      </div>
      <button class="modal-add-btn" onclick="closeModal()">В корзине · ${subtotal} ₽</button>`
    : `<button class="modal-add-btn" onclick="addModal(${id})">Добавить в корзину</button>`;
}

function addModal(id) { add(id); renderModalFooter(id, cart[id]||0); }
function chgModal(id,d) { chg(id,d); const q=cart[id]||0; if(!q){closeModal();return;} renderModalFooter(id,q); }

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  currentModal = null;
}

// ===== CART =====
function add(id) { cart[id]=(cart[id]||0)+1; upd(); toast('Добавлено в корзину ✓'); haptic('light'); }
function chg(id,d) { cart[id]=(cart[id]||0)+d; if(cart[id]<=0) delete cart[id]; upd(); haptic('light'); }
function clearCart() { cart={}; upd(); haptic('medium'); }
function total() { return Object.entries(cart).reduce((s,[id,q])=>{ const p=PRODUCTS.find(x=>x.id===+id); return s+(p?p.price*q:0); },0); }
function count() { return Object.values(cart).reduce((a,b)=>a+b,0); }

function upd() {
  renderProducts();
  renderCartPanel();
  const b=document.getElementById('cartBadge'),c=count();
  b.textContent=c;
  b.classList.toggle('show',c>0);
}

function toggleCart() {
  const p=document.getElementById('cartPanel'),o=document.getElementById('overlay');
  p.classList.toggle('open'); o.classList.toggle('open');
  if(p.classList.contains('open')) renderCartPanel();
}

function renderCartPanel() {
  const el=document.getElementById('cartItems'),ft=document.getElementById('cartFooter');
  const entries=Object.entries(cart);
  if(!entries.length) {
    el.innerHTML=`<div class="cart-empty"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.16 14.26l.04-.12.94-1.7h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0020.04 4H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.45C4.52 15.37 5.48 17 7 17h12v-2H7.42c-.14 0-.25-.11-.25-.25z"/></svg><div class="text">Корзина пуста</div></div>`;
    ft.style.display='none'; return;
  }
  ft.style.display='block';
  el.innerHTML=entries.map(([id,qty],i) => {
    const p=PRODUCTS.find(x=>x.id===+id); if(!p) return '';
    return `<div class="cart-item" style="animation-delay:${i*0.05}s">
      <div class="cart-item-img" style="background-image:url('${p.photo}')"></div>
      <div class="cart-item-info">
        <div class="cart-item-name">${p.name}</div>
        <div class="cart-item-price">${fmt(p.price)} ₽ × ${qty}</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn minus" onclick="chg(${p.id},-1)">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn plus" onclick="chg(${p.id},1)">+</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('cartTotal').textContent=fmt(total())+' ₽';
}

// ===== CHECKOUT =====
function goToCheckout() {
  if(!count()) return;
  toggleCart();
  document.getElementById('catalogView').classList.add('hidden');
  document.getElementById('checkoutView').classList.add('active');
  if(window.Telegram?.WebApp?.initDataUnsafe?.user){
    const u=Telegram.WebApp.initDataUnsafe.user;
    const n=document.getElementById('inpName');
    if(!n.value) n.value=[u.first_name,u.last_name].filter(Boolean).join(' ');
  }
  document.getElementById('orderSummary').innerHTML=Object.entries(cart).map(([id,qty])=>{
    const p=PRODUCTS.find(x=>x.id===+id);
    return `<div class="order-item"><span class="name">${p.name}</span><span class="qp">${qty} × ${fmt(p.price)} ₽</span></div>`;
  }).join('');
  document.getElementById('orderTotal').textContent=fmt(total())+' ₽';
  scrollTo({top:0,behavior:'smooth'});
}

function showCatalog() {
  document.getElementById('catalogView').classList.remove('hidden');
  document.getElementById('checkoutView').classList.remove('active');
  scrollTo({top:0,behavior:'smooth'});
}

function submitOrder() {
  const name=document.getElementById('inpName').value.trim();
  const phone=document.getElementById('inpPhone').value.trim();
  const addr=document.getElementById('inpAddress').value.trim();
  const comm=document.getElementById('inpComment').value.trim();
  if(!name){toast('Введите имя');return;}
  if(!phone){toast('Введите телефон');return;}
  if(!addr){toast('Введите адрес');return;}

  const lines=Object.entries(cart).map(([id,qty])=>{
    const p=PRODUCTS.find(x=>x.id===+id);
    return `  • ${p.name} × ${qty} = ${fmt(p.price*qty)} ₽`;
  });

  const tg = window.Telegram?.WebApp;
  const user = tg?.initDataUnsafe?.user;
  const botToken = '8686175012:AAHBgNk5gEits0bRWSajvaWsK3bALyPHFvw';
  const managerChatId = 8220944155;

  let msgText = '🛍 <b>Новый заказ!</b>\n\n';
  if(user) {
    msgText += '👤 Клиент: <a href="tg://user?id='+user.id+'">'+(user.first_name||'')+' '+(user.last_name||'')+'</a>\n';
    if(user.username) msgText += '📎 @'+user.username+'\n';
    msgText += '🆔 ID: <code>'+user.id+'</code>\n\n';
  }
  msgText += '📝 Имя: '+name+'\n📞 Телефон: '+phone+'\n📍 Адрес: '+addr+'\n';
  if(comm) msgText += '💬 Комментарий: '+comm+'\n';
  msgText += '\n📦 <b>Товары:</b>\n' + lines.join('\n');
  msgText += '\n\n💰 <b>Итого: '+fmt(total())+' ₽</b>';

  // Send order to manager
  fetch('https://api.telegram.org/bot'+botToken+'/sendMessage', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      chat_id: managerChatId,
      text: msgText,
      parse_mode: 'HTML',
      reply_markup: user ? {inline_keyboard:[[{text:'💬 Написать клиенту',url:'tg://user?id='+user.id}]]} : undefined
    })
  }).then(r=>r.json()).then(data=>{
    if(data.ok){
      // Send confirmation to customer
      if(user){
        fetch('https://api.telegram.org/bot'+botToken+'/sendMessage', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            chat_id: user.id,
            text: '✅ <b>Ваш заказ принят!</b>\n\nМенеджер свяжется с вами в ближайшее время.\nСпасибо за покупку! 🎉',
            parse_mode: 'HTML'
          })
        });
      }
      document.getElementById('successOverlay').classList.add('show');
      haptic('success');
    } else {
      toast('Ошибка отправки. Попробуйте ещё раз.');
    }
  }).catch(()=>{
    toast('Ошибка сети. Попробуйте ещё раз.');
  });
}

function resetAll() {
  cart={};
  document.getElementById('successOverlay').classList.remove('show');
  ['inpName','inpPhone','inpAddress','inpComment'].forEach(id=>document.getElementById(id).value='');
  showCatalog(); upd();
}

// ===== UTILS =====
function fmt(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ');}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2000);}
function haptic(s){if(window.Telegram?.WebApp?.HapticFeedback){s==='success'?Telegram.WebApp.HapticFeedback.notificationOccurred('success'):Telegram.WebApp.HapticFeedback.impactOccurred(s);}}

init();
</script>
</body>
</html>
